<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="siteHeader">Sonder</h1>
    <div id="backgroundImage">
        <div id="formContainer">
            <h2>Welcome to Fonyander adventurer! To begin your travels begin by filling out our hero guilde information</h3>
            <form>
                <div class="row">
                    <div class="inputContainer">
                        <label>First name</label>
                        <input type="text" placeholder="Hank" required>
                    </div>
                    <div class="inputContainer">
                        <label>Last name</label>
                        <input type="text" placeholder="Hill" required>
                    </div>
                </div>
                <div class="row">
                    <div class="inputContainer">
                        <label>Email</label>
                        <input type="email" placeholder="propane4evr@gmail.com" required>
                    </div>
                    <div class="inputContainer">
                        <label>Phone</label>
                        <input type="tel" placeholder="+1(xxx) xxx-xxxx" required>
                    </div>
                </div>
                <div class="row">
                    <div class="inputContainer">
                        <label>Password</label>
                        <input type="password" placeholder="peggy123" required>
                    </div>
                    <div class="inputContainer">
                        <label>Confirm password</label>
                        <input type="password" required>
                    </div>
                </div>
                <h2>Adventure infomation</h2>
                <div class="row">
                    <div class="inputContainer">
                        <label>your hero's name</label>
                        <input type="text" placeholder="propane MAN" required>
                    </div>
                    <div class="inputContainer">
                        <label>Class type</label>
                        <select>
                            <option value="Warlock">Warlock</option>
                            <option value="Monk">Monk</option>
                            <option value="Archer">Archer</option>
                            <option value="Paladen">Paladen</option>
                            <option value="Rouge">Rouge</option>
                            <option value="Wizard">Wizard</option>
                        </select>
                    </div>
                </div>
                <div id="raceContainer">
                    <input type="checkbox"id="Orc">
                    <label for="Orc">Orc</label>

                    <input type="checkbox"id="Human" checked>
                    <label for="Human">Human</label>

                    <input type="checkbox"id="Elf">
                    <label for="Elf">Elf</label>

                    <input type="checkbox"id="Dwarf">
                    <label for="Dwarf">Dwarf</label>

                    <input type="checkbox"id="Reptile">
                    <label for="Reptile">Reptile</label>
                </div>
                <div id="bottomForm">
                    <button>Venture fourth!</button>
                </div>
            </form>
        </div>
    </div>
    <h1>Random text</h1>
</body>
</html>
